services:
  - type: web
    name: job-finder-app
    env: python
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn job_finder.wsgi"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: job-finder-db
          property: connectionString
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: job-finder-app
          property: host

databases:
  - name: job-finder-db
    plan: free
